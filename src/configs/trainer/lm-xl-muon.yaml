defaults:
  - lm-xl # use most of the settings from tinyllama-1.1b.yaml
  - _self_ # override with whatever we specify in this file


# optimizer configuration
optimizer:

  # Used to import the optimizer from this class.
  type: muon.ScaledMuon

  # kwargs passed to the optimizer constructor
  kwargs:

    lr: 2.0e-4

    betas: [0.9, 0.95]
    
    eps: 1e-6 # GPT-3 used 1e-8

    weight_decay: 0.1
    